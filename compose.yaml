services:
  api:
    image: gabrielfavar0/bank:v1.1.0
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - SecuritySettings__jwtSecretKey=tubaroestambembotamovosnaverdadecercadequarentaporcentodelesfazisso
      - SecuritySettings__secretSalt=umdiamequestioneisetubaroesbotamovosarespostaequealgunsim
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=bank;Username=usuario;Password=senhasecreta
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bank-net
    
    
  db:
    image: postgres:16-alpine3.22
    environment:
      - POSTGRES_DB=bank
      - POSTGRES_USER=usuario
      - POSTGRES_PASSWORD=senhasecreta
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - bank-net
  
volumes:
  postgres-data:
    
networks:
  bank-net:
    driver: bridge