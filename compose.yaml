services:
  api:
    image: gabrielfavar0/bank:v1.2.0
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - SecuritySettings__jwtSecretKey=tubaroestambembotamovosnaverdadecercadequarentaporcentodelesfazisso
      - SecuritySettings__secretSalt=umdiamequestioneisetubaroesbotamovosarespostaequealgunsim
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=bank;Username=usuario;Password=senhasecreta
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bank-net
    
    
  db:
    image: postgres:16-alpine3.22
    environment:
      - POSTGRES_DB=bank
      - POSTGRES_USER=usuario
      - POSTGRES_PASSWORD=senhasecreta
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "usuario", "-d", "bank"]   
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - bank-net
  
volumes:
  postgres-data:
    
networks:
  bank-net:
    driver: bridge